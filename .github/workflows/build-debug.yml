name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (完整历史,避免ffmpeg浅克隆报错)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install NDK 25.2.9519653
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Init libgocryptfs's own submodules
        run: |
          cd app/libgocryptfs
          git submodule update --init

      - name: Build FFmpeg
        run: |
          cd app/ffmpeg
          chmod +x build.sh
          ./build.sh

      - name: Build libgocryptfs
        run: |
          cd app/libgocryptfs
          chmod +x build.sh
          ./build.sh

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: droidfs-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
